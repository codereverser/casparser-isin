repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # 2 MB allows the frozen AMFI_NAV_31Jan2018.txt (~1.7 MB) reference
        # data without letting the bundled isin.db (~50 MB) slip in via
        # `git add -A`.
        args: [--maxkb=2048]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
